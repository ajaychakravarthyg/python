# End-to-end pipeline (GitHub Actions):
#   test -> package(Nexus) -> image build+scan+push(ECR) -> update GitOps repo
# CI does NOT deploy. It pushes a scanned image and bumps the tag in the GitOps
# repo; Argo CD (in EKS) syncs the change. That commit IS the continuous delivery.

name: ci-cd

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write        # required for AWS OIDC (keyless auth to ECR)

env:
  AWS_REGION: ap-south-1
  IMAGE_NAME: devops-demo-api

jobs:
  # 1) Unit tests (runs on every push + PR) -------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  # 2) Build wheel/sdist and publish to Nexus (PyPI-hosted repo) ----------
  package-nexus:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --no-cache-dir build twine
      - run: python -m build            # -> dist/*.whl and *.tar.gz
      - name: Upload to Nexus
        env:
          TWINE_USERNAME: ${{ secrets.NEXUS_USER }}
          TWINE_PASSWORD: ${{ secrets.NEXUS_PASS }}
          NEXUS_PYPI_URL: ${{ secrets.NEXUS_PYPI_URL }}
        run: twine upload --repository-url "$NEXUS_PYPI_URL" dist/*

  # 3) Build image, SCAN, then push (scan-before-push = don't ship CVEs) --
  image:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.ref.outputs.image }}   # full ref passed to next job
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}   # IAM role trusting GitHub OIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image ref
        id: ref
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: echo "image=${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${{ steps.ref.outputs.image }}" .

      - name: Trivy scan (fail on fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push image
        run: docker push "${{ steps.ref.outputs.image }}"
      # optional (you use cosign): cosign sign --yes "${{ steps.ref.outputs.image }}"

  # 4) GitOps handoff: bump image tag in the manifests repo --------------
  update-gitops:
    needs: image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}   # e.g. your-user/devops-demo-gitops
          token: ${{ secrets.GITOPS_TOKEN }}        # PAT with write to that repo
          path: gitops

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tag & commit
        working-directory: gitops/overlays/prod
        env:
          IMAGE_REF: ${{ needs.image.outputs.image_ref }}
        run: |
          kustomize edit set image ${IMAGE_NAME}=${IMAGE_REF}
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "deploy ${IMAGE_NAME} ${IMAGE_REF}"
          git push
